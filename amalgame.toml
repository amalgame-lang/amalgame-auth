[package]
name              = "amalgame-auth"
version           = "0.1.0"
license           = "Apache-2.0"
description       = "HTTP authentication primitives for the Amalgame / Mosaic stack, reusable outside the web framework. RFC 7617 HTTP Basic (BasicAuth: realm + verifier closure, Reject/Authenticate/Challenge/User, optional loopback/RFC1918 LAN bypass) and a multi-user credential store (Credentials: scrypt password hashing via amalgame-crypto, constant-time verify). A pure HttpRequest -> HttpResponse middleware: no dependency on the web framework, so lean L7 servers (e.g. WebDAV) can require auth without pulling all of amalgame-web."
required-amalgame = ">=0.8.72"
schema-version    = 1

[dependencies]
amalgame-net-http = ">=0.16.0"
amalgame-crypto   = ">=0.6.0"

[stdlib]
classes   = ["Credentials", "BasicAuth"]
header    = "facade-stub.h"
namespace = "Amalgame.Auth"
facade    = "facade.am"
libs      = []
